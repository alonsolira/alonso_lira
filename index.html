<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formulario de Inicio de Sesión con Bulma</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body>
  <section class="section">
    <div class="container">
      <div class="columns is-centered">
        <div class="column is-one-third">
          <div class="box">
            <h1 class="title has-text-centered">Iniciar Sesión</h1>
            <form>
              <div class="field">
                <label class="label">Usuario</label>
                <div class="control">
                  <input class="input" type="email" placeholder="Usuario">
                </div>
              </div>

              <div class="field">
                <label class="label">Contraseña</label>
                <div class="control">
                  <input class="input" type="password" placeholder="********">
                </div>
              </div>

              <div class="field">
                <label class="checkbox">
                  <input type="checkbox">
                  Recordarme
                </label>
              </div>

              <div class="field is-grouped">
                <div class="control">
                  <button class="button is-primary">Iniciar Sesión</button>
                </div>
                <div class="control">
                  <a class="button is-text" href="#">¿Olvidaste tu contraseña?</a>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
